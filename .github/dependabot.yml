version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # urllib3 must stay < 2: parsedmarc hard-requires elasticsearch < 7.14,
      # and elasticsearch 7.13.x caps urllib3 < 2. This holds true even on the
      # latest parsedmarc (10.x), which still pins the elasticsearch 7.x line.
      # Remove this entry only once parsedmarc no longer drags in elasticsearch 7.
